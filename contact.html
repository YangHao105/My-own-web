<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设计师个人网站 - 联系方式</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">Designer</a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">首页</a></li>
                <li><a href="works.html">个人作品</a></li>
                <li><a href="resume.html">个人履历</a></li>
                <li><a href="contact.html">联系方式</a></li>
            </ul>
            <div class="nav-right">
                <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
                    <img src="images/moon.svg" alt="切换到深色模式" id="themeIcon">
                </button>
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </nav>

    <section class="contact-section">
        <div class="contact-card glass-card">
            <h1>联系我</h1>
            <p>如有合作意向或设计需求，欢迎随时与我联系</p>
            
            <form class="contact-form" id="contactForm">
                <div class="form-group">
                    <label for="name">姓名</label>
                    <input type="text" id="name" name="name" placeholder="请输入您的姓名" required>
                </div>
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email" name="email" placeholder="请输入您的邮箱" required>
                </div>
                <div class="form-group">
                    <label for="subject">主题</label>
                    <input type="text" id="subject" name="subject" placeholder="请输入咨询主题" required>
                </div>
                <div class="form-group">
                    <label for="message">留言内容</label>
                    <textarea id="message" name="message" placeholder="请输入您的留言内容..." required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    <i class="fas fa-paper-plane"></i> 发送消息
                </button>
            </form>
            
            <div class="contact-info">
                <div class="info-item glass-card">
                    <i class="fas fa-map-marker-alt"></i>
                    <h4>地址</h4>
                    <p>北京市朝阳区创意设计中心</p>
                </div>
                <div class="info-item glass-card">
                    <i class="fas fa-phone"></i>
                    <h4>电话</h4>
                    <p>138-8888-8888</p>
                </div>
                <div class="info-item glass-card">
                    <i class="fas fa-envelope"></i>
                    <h4>邮箱</h4>
                    <p>hello@designer.com</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="social-links">
            <a href="#" aria-label="微信"><i class="fab fa-weixin"></i></a>
            <a href="#" aria-label="微博"><i class="fab fa-weibo"></i></a>
            <a href="#" aria-label="Behance"><i class="fab fa-behance"></i></a>
            <a href="#" aria-label="Dribbble"><i class="fab fa-dribbble"></i></a>
        </div>
        <p>© 2024 Designer. All rights reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
